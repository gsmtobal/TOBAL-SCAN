<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tobal Scan - Admin Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <!-- Ionicons for Icons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="screen active">
        <div class="login-card">
            <div class="logo-container">
                <h1>Tobal <span class="highlight">Scan</span></h1>
                <p class="subtitle">Admin Portal</p>
            </div>
            
            <form id="login-form">
                <div class="input-group">
                    <ion-icon name="person-outline"></ion-icon>
                    <input type="text" id="username" placeholder="Nom d'utilisateur" required>
                </div>
                <div class="input-group">
                    <ion-icon name="lock-closed-outline"></ion-icon>
                    <input type="password" id="password" placeholder="Mot de passe" required>
                </div>
                <button type="submit" class="btn-primary">SE CONNECTER</button>
                <div id="login-error" class="error-msg"></div>
            </form>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="dashboard-screen" class="screen">
        
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2>T-Scan <span class="highlight">PRO</span></h2>
            </div>
            <ul class="nav-links">
                <li class="active" data-target="cards-view">
                    <ion-icon name="albums-outline"></ion-icon>
                    <span>Mes Fichiers</span>
                </li>
                <li data-target="agents-view">
                    <ion-icon name="people-outline"></ion-icon>
                    <span>Agents</span>
                </li>
                <li id="logout-btn">
                    <ion-icon name="log-out-outline"></ion-icon>
                    <span>Déconnexion</span>
                </li>
            </ul>
        </nav>

        <!-- Main Content -->
        <main class="content">
            <!-- Header -->
            <header>
                <div class="header-left">
                    <h2 id="page-title">Mes Fichiers</h2>
                    <p class="stats">Total: <span id="total-count" class="highlight-text">0</span> codes</p>
                </div>
                <div class="header-right">
                    <button class="btn-secondary" id="refresh-btn">
                        <ion-icon name="sync-outline"></ion-icon> Actualiser
                    </button>
                    <div class="user-profile">
                        <ion-icon name="person-circle-outline"></ion-icon>
                        <span id="logged-user">Admin</span>
                    </div>
                </div>
            </header>

            <!-- Cards View -->
            <section id="cards-view" class="view-section active">
                <div class="toolbar">
                    <div class="search-box">
                        <ion-icon name="search-outline"></ion-icon>
                        <input type="text" id="search-input" placeholder="Rechercher par fichier ou code...">
                    </div>
                    <div class="actions">
                        <button class="btn-export" id="export-csv-btn">
                            <ion-icon name="download-outline"></ion-icon> Export CSV
                        </button>
                        <button class="btn-export" id="export-txt-btn">
                            <ion-icon name="document-text-outline"></ion-icon> Export TXT
                        </button>
                    </div>
                </div>

                <div class="table-container">
                    <table id="cards-table">
                        <thead>
                            <tr>
                                <th>Code (15 chiffres)</th>
                                <th>Opérateur</th>
                                <th>Montant</th>
                                <th>Fichier</th>
                                <th>Agent</th>
                                <th>Date</th>
                            </tr>
                        </thead>
                        <tbody id="cards-tbody">
                            <!-- Data populated via JS -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Agents View -->
            <section id="agents-view" class="view-section">
                <div class="toolbar">
                    <h3>Gestion des Agents</h3>
                    <button class="btn-primary" id="add-agent-btn">
                        <ion-icon name="add-circle-outline"></ion-icon> Ajouter Agent
                    </button>
                </div>
                
                <div class="cards-grid" id="agents-grid">
                    <!-- Agent cards populated via JS -->
                </div>
            </section>

        </main>
    </div>

    <!-- Add Agent Modal -->
    <div id="agent-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2>Nouvel Agent</h2>
            <form id="agent-form">
                <div class="input-group">
                    <input type="text" id="agent-name" placeholder="Nom de l'agent" required>
                </div>
                <div class="input-group">
                    <input type="password" id="agent-pin" placeholder="Code PIN" required>
                </div>
                <button type="submit" class="btn-primary">SAUVEGARDER</button>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
